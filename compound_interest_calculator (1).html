<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강의용 복리 & 역산 계산기</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #1e1e24;
            --card-bg: #2a2a32;
            --text-color: #ffffff;
            --accent-color: #4caf50;
            --accent-inverse: #ff9800;
        }
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 1000px;
        }
        h1 { text-align: center; color: var(--accent-color); font-size: 2.5rem; margin-bottom: 30px; }
        
        /* 탭 스타일 */
        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .tab-btn {
            background-color: #3a3a44;
            color: #aaa;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 8px;
            margin: 0 10px;
            transition: 0.3s;
            font-weight: bold;
        }
        .tab-btn.active {
            background-color: var(--accent-color);
            color: white;
        }
        
        /* 메인 레이아웃 */
        .content {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 30px;
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        @media (max-width: 800px) {
            .content { grid-template-columns: 1fr; }
        }

        /* 입력 폼 스타일 */
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 1.1rem;
            color: #ccc;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            font-size: 1.2rem;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #1e1e24;
            color: white;
            box-sizing: border-box;
        }
        
        /* 결과 노출 영역 */
        .result-box {
            background-color: #1e1e24;
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid var(--accent-color);
            margin-top: 20px;
        }
        .result-title { font-size: 1.1rem; color: #aaa; margin-bottom: 5px; }
        .result-value { font-size: 2.2rem; font-weight: bold; color: var(--accent-color); }
        
        /* 차트 영역 크기 제어 */
        .chart-container {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: 350px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 자산 성장 시뮬레이터</h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('forward')">미래 자산 계산 (정방향)</button>
        <button class="tab-btn" onclick="switchTab('backward')">목표 달성 계산 (역산)</button>
    </div>

    <div class="content">
        <div>
            <div id="forward-inputs">
                <div class="input-group">
                    <label>현재 원금 (원)</label>
                    <input type="text" inputmode="numeric" id="p-amount" value="10,000,000" oninput="formatAndRecalc(this, calculateForward)">
                </div>
                <div class="input-group">
                    <label>예상 연 수익률 (%)</label>
                    <input type="number" id="p-rate" value="7" step="0.1" oninput="calculateForward()">
                </div>
                <div class="input-group">
                    <label>투자 기간 (년)</label>
                    <input type="number" id="p-years" value="10" oninput="calculateForward()">
                </div>
                <div class="result-box">
                    <div class="result-title">만기 예상 금액</div>
                    <div class="result-value" id="forward-result">0 원</div>
                </div>
            </div>

            <div id="backward-inputs" class="hidden">
                <div class="input-group">
                    <label>현재 원금 (원)</label>
                    <input type="text" inputmode="numeric" id="b-p-amount" value="10,000,000" oninput="formatAndRecalc(this, calculateBackward)">
                </div>
                <div class="input-group">
                    <label>목표 금액 (원)</label>
                    <input type="text" inputmode="numeric" id="b-target" value="50,000,000" oninput="formatAndRecalc(this, calculateBackward)">
                </div>
                <div class="input-group">
                    <label>계산 모드 선택</label>
                    <select id="calc-mode" onchange="toggleBackwardMode()">
                        <option value="find-time">필요한 기간 구하기 (수익률 입력)</option>
                        <option value="find-rate">필요한 수익률 구하기 (기간 입력)</option>
                    </select>
                </div>
                <div class="input-group" id="b-rate-group">
                    <label>가정할 연 수익률 (%)</label>
                    <input type="number" id="b-rate" value="8" step="0.1" oninput="calculateBackward()">
                </div>
                <div class="input-group" id="b-year-group" style="display:none;">
                    <label>목표 달성 기간 (년)</label>
                    <input type="number" id="b-years" value="10" oninput="calculateBackward()">
                </div>
                <div class="result-box" style="border-left-color: var(--accent-inverse);">
                    <div class="result-title" id="backward-result-title">필요한 기간</div>
                    <div class="result-value" id="backward-result" style="color: var(--accent-inverse);">0</div>
                </div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="growthChart"></canvas>
        </div>
    </div>
</div>

<script>
    let currentTab = 'forward';
    let chart;

    // 콤마 포맷팅 함수 (입력 시 천단위 콤마 자동 추가, 커서 위치 보정)
    function formatWithCommas(input) {
        let cursorPos = input.selectionStart;
        let originalLength = input.value.length;
        let raw = input.value.replace(/[^0-9]/g, '');
        let formatted = raw === '' ? '' : parseInt(raw, 10).toLocaleString('en-US');
        input.value = formatted;
        let diff = formatted.length - originalLength;
        let newPos = Math.max(0, cursorPos + diff);
        input.setSelectionRange(newPos, newPos);
    }

    // 콤마 포맷팅 후 재계산 실행
    function formatAndRecalc(input, calcFn) {
        formatWithCommas(input);
        calcFn();
    }

    // 콤마가 포함된 문자열을 숫자로 변환
    function parseAmt(str) {
        return parseFloat((str || '0').toString().replace(/,/g, '')) || 0;
    }

    // 초기화 및 차트 생성
    window.onload = function() {
        const ctx = document.getElementById('growthChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: [], datasets: [{ label: '자산 추이', data: [], borderColor: '#4caf50', tension: 0.1, fill: false }] },
            options: { 
                responsive: true, 
                maintainAspectRatio: false, 
                scales: { 
                    y: { ticks: { color: '#fff' } },
                    x: { ticks: { color: '#fff' } }
                } 
            }
        });
        calculateForward();
    };

    // 탭 전환 로직
    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        if(tab === 'forward') {
            document.getElementsByClassName('tab-btn')[0].classList.add('active');
            document.getElementById('forward-inputs').classList.remove('hidden');
            document.getElementById('backward-inputs').classList.add('hidden');
            calculateForward();
        } else {
            document.getElementsByClassName('tab-btn')[1].classList.add('active');
            document.getElementById('forward-inputs').classList.add('hidden');
            document.getElementById('backward-inputs').classList.remove('hidden');
            calculateBackward();
        }
    }

    // 역산 모드 선택 전환 (기간 vs 수익률)
    function toggleBackwardMode() {
        const mode = document.getElementById('calc-mode').value;
        if(mode === 'find-time') {
            document.getElementById('b-rate-group').style.display = 'block';
            document.getElementById('b-year-group').style.display = 'none';
        } else {
            document.getElementById('b-rate-group').style.display = 'none';
            document.getElementById('b-year-group').style.display = 'block';
        }
        calculateBackward();
    }

    // 금액 포맷 함수 (강의용 억/만 단위 표현 개선)
    function formatKoreanAmount(num) {
        if (num === 0) return "0원";
        let result = [];
        let uk = Math.floor(num / 100000000);
        let man = Math.floor((num % 100000000) / 10000);
        let rest = Math.round(num % 10000); // 만원 미만 단수 처리
        
        if (uk > 0) result.push(uk + "억");
        if (man > 0) result.push(man + "만");
        if (rest > 0 && uk === 0 && man === 0) result.push(rest.toLocaleString('en-US'));
        
        return result.join(" ") + " 원";
    }

    // 1탭: 미래 자산 계산기 로직
    function calculateForward() {
        const pv = parseAmt(document.getElementById('p-amount').value);
        const r = (parseFloat(document.getElementById('p-rate').value) || 0) / 100;
        const t = parseInt(document.getElementById('p-years').value) || 0;

        let labels = [];
        let data = [];
        
        for (let i = 0; i <= t; i++) {
            labels.push(i + '년차');
            let fv = pv * Math.pow((1 + r), i);
            data.push(Math.round(fv));
        }

        document.getElementById('forward-result').innerText = formatKoreanAmount(data[data.length - 1]);
        updateChart(labels, data, '#4caf50');
    }

    // 2탭: 역산 계산기 로직
    function calculateBackward() {
        const pv = parseAmt(document.getElementById('b-p-amount').value);
        const fv = parseAmt(document.getElementById('b-target').value);
        const mode = document.getElementById('calc-mode').value;

        if (pv >= fv) {
            document.getElementById('backward-result').innerText = "목표가 원금보다 작거나 같습니다.";
            return;
        }

        let labels = [];
        let data = [];

        if (mode === 'find-time') {
            document.getElementById('backward-result-title').innerText = "목표 달성까지 필요한 기간";
            const r = (parseFloat(document.getElementById('b-rate').value) || 0) / 100;
            if(r <= 0) {
                document.getElementById('backward-result').innerText = "수익률을 입력해주세요.";
                return;
            }

            const t = Math.log(fv / pv) / Math.log(1 + r);
            const years = Math.floor(t);
            const months = Math.round((t - years) * 12);
            document.getElementById('backward-result').innerText = `${years}년 ${months}개월`;

            for(let i=0; i<=years+1; i++) {
                labels.push(i + '년차');
                data.push(Math.round(pv * Math.pow(1+r, i)));
            }
        } else {
            document.getElementById('backward-result-title').innerText = "목표 달성을 위한 필요 수익률";
            const t = parseInt(document.getElementById('b-years').value) || 0;
            if(t <= 0) {
                document.getElementById('backward-result').innerText = "기간을 1년 이상 입력해주세요.";
                return;
            }

            const r = Math.pow((fv / pv), (1 / t)) - 1;
            const ratePercent = (r * 100).toFixed(2);
            document.getElementById('backward-result').innerText = `연 ${ratePercent} %`;

            for(let i=0; i<=t; i++) {
                labels.push(i + '년차');
                data.push(Math.round(pv * Math.pow(1+r, i)));
            }
        }
        updateChart(labels, data, '#ff9800');
    }

    // 차트 업데이트 공통 함수
    function updateChart(labels, data, color) {
        chart.data.labels = labels;
        chart.data.datasets[0].data = data;
        chart.data.datasets[0].borderColor = color;
        chart.update();
    }
</script>
</body>
</html>
